name: Feature request
description: 提议新的功能、接口或工作流改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 当前流程在哪个环节无法满足需求
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述输入、输出、兼容性和预期交互
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的替代方案
  - type: checkboxes
    id: compatibility
    attributes:
      label: 兼容性确认
      options:
        - label: 方案会保留现有配置、数据契约、审核流程和 UI 行为
          required: true
        - label: 示例中不包含真实金融账户或访问凭据
          required: true
