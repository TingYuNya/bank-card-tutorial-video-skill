name: Bug report
description: 报告可以稳定复现的程序问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请勿提交 API Key、Token、真实银行卡号、CVV、验证码、账户号或未脱敏账单。
  - type: input
    id: version
    attributes:
      label: 项目版本
      placeholder: v0.1.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、Python、FFmpeg、浏览器和 TTS 提供商
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供最小、完整且可重复的步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为与日志
      description: 请先完成脱敏
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: 隐私确认
      options:
        - label: 我已删除凭据、完整卡号、验证码和其他敏感信息
          required: true
