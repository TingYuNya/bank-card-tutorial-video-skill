<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">银行卡教程视频成片示意</title>
  <desc id="desc">浅灰背景中显示银行应用登录页面、蓝色登录按钮、章节标题和底部字幕。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e8eef8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#334155" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="44" font-weight="750" fill="#0f172a">第一步：登录账户</text>
  <g filter="url(#shadow)">
    <rect x="285" y="112" width="630" height="405" rx="34" fill="#ffffff"/>
    <rect x="345" y="164" width="510" height="278" rx="22" fill="#f8fafc" stroke="#b8c4d6" stroke-width="3"/>
    <circle cx="385" cy="198" r="7" fill="#f87171"/>
    <circle cx="410" cy="198" r="7" fill="#fbbf24"/>
    <circle cx="435" cy="198" r="7" fill="#34d399"/>
    <rect x="405" y="246" width="390" height="58" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="3"/>
    <text x="432" y="282" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8">Account email</text>
    <rect x="445" y="334" width="310" height="76" rx="38" fill="#2563eb"/>
    <text x="600" y="384" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="35" font-weight="750" fill="#ffffff">登录</text>
  </g>
  <rect x="100" y="548" width="1000" height="82" rx="18" fill="#111827" fill-opacity=".72"/>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, PingFang SC, sans-serif" font-size="31" font-weight="650" fill="#ffffff">先打开银行官方应用，并登录已经注册的账户。</text>
  <rect x="42" y="36" width="150" height="38" rx="19" fill="#dbeafe"/>
  <text x="117" y="61" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">FINAL FRAME</text>
</svg>
