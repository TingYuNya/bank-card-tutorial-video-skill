<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>分镜审核</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #eef2f7; color: #111827; font-family: system-ui, "PingFang SC", sans-serif; }
    header { position: sticky; top: 0; z-index: 20; padding: 18px 28px; background: rgba(255,255,255,.94); backdrop-filter: blur(12px); border-bottom: 1px solid #dbe3ee; display:flex; align-items:center; justify-content:space-between; }
    h1 { margin: 0; font-size: 24px; }
    main { max-width: 1380px; margin: 28px auto; padding: 0 22px 80px; }
    .summary { background: white; border-radius: 16px; padding: 18px; margin-bottom: 20px; box-shadow: 0 10px 28px rgba(15,23,42,.06); }
    .card { display: grid; grid-template-columns: minmax(280px, 42%) 1fr; gap: 24px; background: white; border-radius: 18px; padding: 20px; margin-bottom: 18px; box-shadow: 0 12px 34px rgba(15,23,42,.07); }
    .media { background: #111827; border-radius: 14px; min-height: 320px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .media img { max-width: 100%; max-height: 540px; object-fit: contain; }
    .placeholder { color: #cbd5e1; padding: 40px; text-align:center; }
    .meta { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .narration { font-size: 19px; line-height: 1.7; margin: 12px 0; }
    .tag { display:inline-block; padding: 5px 10px; border-radius:999px; margin:3px 4px 3px 0; background:#e8efff; color:#1d4ed8; font-size:12px; }
    .warning { background:#fff7ed; color:#9a3412; border-radius:10px; padding:10px; margin-top:10px; }
    textarea { width:100%; min-height:78px; padding:10px; border:1px solid #cbd5e1; border-radius:10px; }
    .decision { margin-top: 12px; display:flex; gap:14px; align-items:center; }
    button { background:#2563eb; color:white; border:0; padding:11px 18px; border-radius:10px; font-weight:700; cursor:pointer; }
    #status { color:#2563eb; min-width:240px; text-align:right; }
    @media(max-width:850px){ .card{grid-template-columns:1fr;} header{align-items:flex-start;gap:12px;flex-direction:column;} #status{text-align:left;} }
  </style>
</head>
<body>
<header><div><h1>银行卡教程分镜审核</h1><div style="color:#64748b;margin-top:4px">逐场景核对画面、事实来源和隐私遮挡</div></div><div><button id="save">保存审核</button><span id="status"></span></div></header>
<main><section class="summary" id="summary">加载中</section><div id="cards"></div></main>
<script>
let storyboard, narration, facts, privacy;
const byId = (items, key='id') => Object.fromEntries((items || []).map(item => [item[key], item]));
async function init(){
  [storyboard,narration,facts,privacy] = await Promise.all([
    fetch('../work/storyboard.json',{cache:'no-store'}).then(r=>r.json()),
    fetch('../work/narration.json',{cache:'no-store'}).then(r=>r.json()),
    fetch('../work/fact-check.json',{cache:'no-store'}).then(r=>r.json()),
    fetch('../work/privacy-review.json',{cache:'no-store'}).then(r=>r.json())
  ]);
  const narr = byId(narration.scenes);
  const claims = byId(facts.claims);
  const privacyByAsset = byId(privacy.assets,'asset');
  document.getElementById('summary').innerHTML = `<strong>${narration.title || '未命名教程'}</strong><div style="margin-top:8px;color:#64748b">${storyboard.scenes.length} 个分镜，${facts.claims.length} 条事实核验，${privacy.assets.length} 张图片已进入隐私检查清单。</div>`;
  document.getElementById('cards').innerHTML = storyboard.scenes.map((scene,index)=>{
    const n = narr[scene.narration_scene_id] || {};
    const claimTags = (scene.source_claim_ids || []).map(id=>{ const c=claims[id]||{}; return `<span class="tag">${id} · ${c.status || 'missing'}</span>`; }).join('');
    const p = privacyByAsset[scene.asset];
    const privacyWarning = scene.asset && (!p || p.reviewed !== true) ? `<div class="warning">该素材尚未完成隐私检查</div>` : '';
    const media = scene.asset ? `<img src="../${scene.asset}" alt="" />` : `<div class="placeholder">${scene.kind === 'card' ? '信息卡场景' : '没有主素材'}</div>`;
    return `<article class="card" data-id="${scene.id}"><div class="media">${media}</div><div><div class="meta">${String(index+1).padStart(2,'0')} · ${scene.id} · ${scene.kind || 'image'}</div><h2 style="margin:0">${scene.screen_text || scene.task || '未填写屏幕文案'}</h2><div class="narration">${n.text || '缺少对应配音文本'}</div><div><span class="tag">任务：${scene.task || '未填写'}</span><span class="tag">动作：${scene.motion?.type || 'none'}</span>${claimTags}</div>${privacyWarning}<p>审核备注</p><textarea data-note placeholder="标注按钮位置、图片选择、事实表述、隐私遮挡或节奏问题"></textarea><div class="decision"><label><input type="radio" name="decision-${scene.id}" value="approved" /> 通过</label><label><input type="radio" name="decision-${scene.id}" value="changes" /> 需修改</label></div></div></article>`;
  }).join('');
}
document.getElementById('save').addEventListener('click', async()=>{
  const decisions = [...document.querySelectorAll('.card')].map(card=>({
    scene_id: card.dataset.id,
    decision: card.querySelector('input[type=radio]:checked')?.value || 'pending',
    notes: card.querySelector('[data-note]').value
  }));
  const approved = decisions.length > 0 && decisions.every(item=>item.decision === 'approved');
  const payload = { approved, approved_by:'user', decisions, saved_at:new Date().toISOString() };
  const response = await fetch('/api/save-storyboard-review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  document.getElementById('status').textContent = response.ok ? `已保存，整体状态：${approved ? '通过' : '待修改'}` : `保存失败：${response.status}`;
});
init().catch(err=>{ document.getElementById('summary').textContent=String(err.stack||err); });
</script>
</body>
</html>
